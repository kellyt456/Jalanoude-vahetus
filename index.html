<!DOCTYPE html>
<html lang="et">
<head>
  <meta charset="UTF-8">
  <title>Üks Tallinna Kool</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      text-align: center;
      max-width: 900px;
      padding: 40px;
    }

    h1 {
      font-size: 48px;
      margin-bottom: 20px;
    }

    .weather {
      font-size: 24px;
      margin-bottom: 20px;
      opacity: 0.8;
    }

    .message {
      font-size: 34px;
      background: rgba(255,255,255,0.1);
      padding: 30px;
      border-radius: 20px;
      line-height: 1.4;
      margin-bottom: 20px;
    }

    button {
      padding: 15px 30px;
      font-size: 18px;
      border: none;
      border-radius: 12px;
      background: #38bdf8;
      color: black;
      cursor: pointer;
    }

    button:hover {
      background: #0ea5e9;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>Üks Tallinna Kool</h1>
  <div class="weather" id="weather">Laen ilma...</div>
  <div class="message" id="msg">AI mõtleb...</div>
  <button onclick="refreshMessage()">🔁 Uus sõnum</button>
</div>

<script>
let currentTemp = 0;
let currentRain = 0;

async function load() {
  const res = await fetch(
    "https://api.open-meteo.com/v1/forecast?latitude=59.437&longitude=24.7536&current=temperature_2m,precipitation"
  );

  const data = await res.json();

  currentTemp = data.current.temperature_2m;
  currentRain = data.current.precipitation;

  document.getElementById("weather").innerText =
    `Tallinn: ${currentTemp}°C | sademed: ${currentRain}`;

  refreshMessage();
}

function generateMsg(temp, rain) {
  let messages = [];

  if (rain > 0) {
    messages = [
      "Vihm + tossud = pori klassis 🤢 Vaheta jalanõud!",
      "Su jalanõud korjasid just Tallinna tänavad üles 😬",
      "Pori ei kuulu matemaatikasse 📚",
      "Märg ilm = bakterite pidu 🦠",
      "Kui sa ei vaheta, tood klassi tasuta mustuse DLC 🎮",
      "Su tossud on nüüd mud monster 👟🤢",
      "Ära tee klassist mudalahingu ala 😄",
      "Väljas vihm, sees puhtus – lihtne reegel",
      "Bakterid armastavad niiskust 🦠",
      "Su jalanõud ei pea klassis seiklema 😄"
    ];
  } else if (temp < 0) {
    messages = [
      "Külm + märg = jalaseene dream combo 😬",
      "Talv väljas, mitte klassis ❄️",
      "Lumevesi = bakterite spa 🦠",
      "Su tossud sulavad klassis ära 🤢",
      "Ära too lund klassi 😄",
      "Jalanõude vahetus = brain move 🧠",
      "Külm + niiskus = halb combo",
      "Su jalad väärivad paremat 😄",
      "See ei ole jääkoobas 🧊",
      "Vaheta jalanõud või suffer consequences 😬"
    ];
  } else {
    messages = [
      "Ära too tänavat klassi 👟",
      "Basic hygiene = vaheta jalanõud 😄",
      "Puhtad jalanõud = parem vibe ✨",
      "Su tossud ei vaja klassis side quest’i 🎮",
      "Ole normaalne – vaheta jalanõud 😄",
      "Klass ≠ tänav",
      "Väike samm, suur puhtus",
      "Ära jaga mustust sõpradega 🤢",
      "Su jalanõud ei pea igale poole tulema",
      "Puhas klass = parem elu 😄"
    ];
  }

  return messages[Math.floor(Math.random() * messages.length)];
}

function refreshMessage() {
  const msg = generateMsg(currentTemp, currentRain);
  document.getElementById("msg").innerText = msg;
}

// käivita
load();

// automaatne vahetus iga 10 min
setInterval(load, 600000);
</script>

</body>
</html>
