<!DOCTYPE html>
<html lang="et">
<head>
  <meta charset="UTF-8">
  <title>Üks Tallinna Kool</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      text-align: center;
      max-width: 900px;
      padding: 40px;
    }

    h1 {
      font-size: 48px;
    }

    .date {
      font-size: 20px;
      opacity: 0.7;
      margin-top: 5px;
    }

    .weather {
      font-size: 24px;
      margin: 20px;
    }

    .message {
      font-size: 34px;
      background: rgba(255,255,255,0.1);
      padding: 30px;
      border-radius: 20px;
      margin-bottom: 20px;
      line-height: 1.4;
    }

    button {
      padding: 15px 30px;
      font-size: 18px;
      border: none;
      border-radius: 12px;
      background: #38bdf8;
      color: black;
      cursor: pointer;
    }

    button:hover {
      background: #0ea5e9;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>Üks Tallinna Kool</h1>
  <div class="date" id="date"></div>
  <div class="weather" id="weather">Laen ilma...</div>
  <div class="message" id="msg">AI mõtleb...</div>
  <button onclick="refreshMessage()">🔁 Uus sõnum</button>
</div>

<script>
let currentTemp = 0;
let currentRain = 0;

const messages = [
"Vaheta jalanõud – su drip ei päästa, kui lõhn juba ette jõuab 😬👟",
"Klass ei ole koht, kus testida, kui kaua jalaseen “meta” on 🤢🦠",
"Sisejalanõud jalga – muidu su saapad teevad ruumis keemiarünnaku ☣️😷",
"Kui põrand kleepub, siis keegi EI vahetanud jalanõusid. Ära ole see inimene 😄",
"Su jalad higistavad rohkem kui sina kontrolltöös – lase neil hingata 🥵🧦",
"Tänava pori ei ole esteetika. Jäta see õue, mitte klassi põrandale 🌧️👟",
"Jalanõude vahetamine = null vaeva, aga 100% vähem haisu 💨",
"Kui su jalanõud hakkavad omaette eluvorme kasvatama, on aeg midagi muuta 🦠😬",
"Märjad tossud klassis = tasuta lõhnashow kõigile. Keegi ei tahtnud seda 🤢🎭",
"Sisejalanõud hoiavad su jalad (ja maine) värskena 😎✨",
"Ära too välismaailma baktereid klassi – neil pole tunniplaani 🦠📚",
"Libe põrand ei ole parkour’i kutse. Vaheta jalanõud 🧊😄",
"Su jalanõud võivad olla bränd, aga hais on universaalne 😬🌍",
"Jalanõude vahetus: väiksem effort kui see, et kõik aknad lahti tehakse sinu pärast 💨😂",
"Respect teiste vastu algab lihtsast asjast – pane sisejalanõud jalga 🤝👟"
];

function formatDate() {
  const d = new Date();
  return d.toLocaleDateString("et-EE", {
    weekday: "long",
    day: "numeric",
    month: "long"
  });
}

async function load() {
  document.getElementById("date").innerText = formatDate();

  const res = await fetch(
    "https://api.open-meteo.com/v1/forecast?latitude=59.437&longitude=24.7536&current=temperature_2m,precipitation"
  );

  const data = await res.json();

  currentTemp = data.current.temperature_2m;
  currentRain = data.current.precipitation;

  document.getElementById("weather").innerText =
    `Tallinn: ${currentTemp}°C | sademed: ${currentRain}`;

  refreshMessage();
}

function refreshMessage() {
  let base = messages[Math.floor(Math.random() * messages.length)];

  if (currentRain > 0) {
    base += " 🌧️ (Täna eriti oluline!)";
  } else if (currentTemp < 0) {
    base += " ❄️ (Külm + niiske = double trouble)";
  }

  document.getElementById("msg").innerText = base;
}

// start
load();

// uuenda iga 10 min
setInterval(load, 600000);
</script>

</body>
</html>
