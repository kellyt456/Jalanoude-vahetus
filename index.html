<!DOCTYPE html>
<html lang="et">
<head>
  <meta charset="UTF-8">
  <title>Üks Tallinna Kool</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      text-align: center;
      max-width: 900px;
      padding: 40px;
    }

    h1 {
      font-size: 48px;
      margin-bottom: 20px;
    }

    .weather {
      font-size: 24px;
      margin-bottom: 30px;
      opacity: 0.8;
    }

    .message {
      font-size: 38px;
      background: rgba(255,255,255,0.1);
      padding: 30px;
      border-radius: 20px;
      line-height: 1.4;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>Üks Tallinna Kool</h1>
  <div class="weather" id="weather">Laen ilma...</div>
  <div class="message" id="msg">AI mõtleb...</div>
</div>

<script>
async function load() {
  const res = await fetch(
    "https://api.open-meteo.com/v1/forecast?latitude=59.437&longitude=24.7536&current=temperature_2m,precipitation"
  );

  const data = await res.json();

  let temp = data.current.temperature_2m;
  let rain = data.current.precipitation;

  document.getElementById("weather").innerText =
    `Tallinn: ${temp}°C | sademed: ${rain}`;

  document.getElementById("msg").innerText = generateMsg(temp, rain);
}

function generateMsg(temp, rain) {
  let messages = [];

  if (rain > 0) {
    messages = [
      "Väljas on märg – tood pori klassi 🤢 Vaheta jalanõud!",
      "Su tossud korjasid just tänava üles 😬 Jäta see ukse taha!",
      "Märg ilm = bakterite pidu 🦠 Ära kutsu neid klassi!",
      "Pori ei kuulu matemaatikatundi 😄 Vaheta jalanõud!",
    ];
  } else if (temp < 0) {
    messages = [
      "Külm + märg = ideaalne jalaseenele 😬 Vaheta jalanõud!",
      "Lumevesi klassis = bakterite spa 🦠",
      "Talv on õues, mitte klassis ❄️ Vaheta jalanõud!",
    ];
  } else if (temp < 10) {
    messages = [
      "Niisked jalanõud + soe klass = bakterite unistus 🦠",
      "Su tossud ei vaja klassis lisa seiklusi 😄",
      "Natuke niiskust + soe ruum = halb combo 🤢",
    ];
  } else {
    messages = [
      "Isegi kuiva ilmaga tood mustust 😄 Vaheta jalanõud!",
      "Puhtad jalanõud = parem koolipäev",
      "Ära too tänavat klassi 👟",
    ];
  }

  // iga 10 min uus sõnum
  let time = Math.floor(Date.now() / 600000);
  return messages[time % messages.length];
}

// käivita
load();

// uuenda iga 10 min
setInterval(load, 600000);
</script>

</body>
</html>
