<!DOCTYPE html>
<html lang="et">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Üks Tallinna Kool</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      text-align: center;
      max-width: 900px;
      padding: 40px;
    }

    h1 {
      font-size: 48px;
      margin-bottom: 10px;
    }

    .date {
      font-size: 20px;
      opacity: 0.7;
      margin-top: 5px;
    }

    .weather {
      font-size: 24px;
      margin: 20px 0;
    }

    .message {
      font-size: 34px;
      background: rgba(255,255,255,0.1);
      padding: 30px;
      border-radius: 20px;
      margin-bottom: 20px;
      line-height: 1.4;
    }

    button {
      padding: 15px 30px;
      font-size: 18px;
      border: none;
      border-radius: 12px;
      background: #38bdf8;
      color: black;
      cursor: pointer;
    }

    button:hover {
      background: #0ea5e9;
    }

    .small {
      margin-top: 12px;
      font-size: 14px;
      opacity: 0.7;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Üks Tallinna Kool</h1>
    <div class="date" id="date"></div>
    <div class="weather" id="weather">Laen ilma...</div>
    <div class="message" id="msg">AI mõtleb...</div>
    <button onclick="refreshMessage()">🔁 Uus sõnum</button>
    <div class="small" id="info"></div>
  </div>

  <script>
    let currentTemp = 0;
    let currentRain = 0;
    let currentWeatherCode = 0;
    let isRainy = false;
    let currentPlace = "sinu asukohas";

    const rainMessages = [
      "Kui põrand kleepub, siis keegi EI vahetanud jalanõusid. Ära ole see inimene.",
      "Tänava pori ei ole esteetika. Jäta see õue, mitte klassi põrandale.",
      "Märjad tossud klassis = tasuta lõhnashow kõigile. Keegi ei tahtnud seda.",
      "Libe põrand ei ole parkour’i kutse. Vaheta jalanõud.",
      "Jalanõude vahetus: väiksem effort kui see, et kõik aknad lahti tehakse sinu pärast.",
      "Ära too välismaailma baktereid klassi – neil pole tunniplaani.",
      "Klass ei ole koht, kus testida, kui kaua jalaseen “meta” on."
    ];

    const dryMessages = [
      "Vaheta jalanõud – su drip ei päästa, kui lõhn juba ette jõuab.",
      "Sisejalanõud jalga – muidu su saapad teevad ruumis keemiarünnaku.",
      "Su jalad higistavad rohkem kui sina kontrolltöös – lase neil hingata.",
      "Jalanõude vahetamine = null vaeva, aga 100% vähem haisu.",
      "Kui su jalanõud hakkavad omaette eluvorme kasvatama, on aeg midagi muuta.",
      "Sisejalanõud hoiavad su jalad (ja maine) värskena.",
      "Su jalanõud võivad olla bränd, aga hais on universaalne.",
      "Respect teiste vastu algab lihtsast asjast – pane sisejalanõud jalga."
    ];

    function formatDate() {
      const d = new Date();
      return d.toLocaleDateString("et-EE", {
        weekday: "long",
        day: "numeric",
        month: "long"
      });
    }

    function isRainyWeatherCode(code) {
      // Open-Meteo weather code loogika:
      // 51–67 = vihm / jäide / jäätuv vihm
      // 80–82 = hoovihm
      // 95–99 = äike / tugev sadu
      return (
        (code >= 51 && code <= 67) ||
        (code >= 80 && code <= 82) ||
        (code >= 95 && code <= 99)
      );
    }

    function getGeolocation() {
      return new Promise((resolve, reject) => {
        if (!navigator.geolocation) {
          reject(new Error("Geolocation pole toetatud"));
          return;
        }

        navigator.geolocation.getCurrentPosition(
          (pos) => {
            resolve({
              lat: pos.coords.latitude,
              lon: pos.coords.longitude
            });
          },
          (err) => reject(err),
          {
            enableHighAccuracy: true,
            timeout: 10000,
            maximumAge: 600000
          }
        );
      });
    }

    async function loadWeatherForLocation(lat, lon) {
      const res = await fetch(
        `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,precipitation,weather_code&timezone=auto`
      );

      const data = await res.json();

      currentTemp = data.current.temperature_2m;
      currentRain = data.current.precipitation ?? 0;
      currentWeatherCode = data.current.weather_code ?? 0;

      isRainy = currentRain > 0.1 || isRainyWeatherCode(currentWeatherCode);

      document.getElementById("weather").innerText =
        `${currentPlace}: ${currentTemp}°C | ${isRainy ? "vihmane" : "kuiv"}`;

      document.getElementById("info").innerText =
        `Tuvastatud ilmakaart: ${currentWeatherCode} | sademed: ${currentRain}`;

      refreshMessage();
    }

    async function load() {
      document.getElementById("date").innerText = formatDate();

      try {
        const coords = await getGeolocation();
        currentPlace = "Sinu asukohas";
        await loadWeatherForLocation(coords.lat, coords.lon);
      } catch (e) {
        currentPlace = "Tallinnas";
        await loadWeatherForLocation(59.437, 24.7536);
        document.getElementById("info").innerText =
          "Asukoha luba puudus, kasutan Tallinna ilma.";
      }
    }

    function refreshMessage() {
      const source = isRainy ? rainMessages : dryMessages;
      const base = source[Math.floor(Math.random() * source.length)];

      document.getElementById("msg").innerText = base;
    }

    load();
    setInterval(load, 600000);
  </script>
</body>
</html>
